name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Tests
        run: deno task test
      - name: Compile multi-arch binaries
        run: |
          mkdir -p dist
          for target in \
            x86_64-unknown-linux-gnu \
            aarch64-unknown-linux-gnu \
            x86_64-apple-darwin \
            aarch64-apple-darwin \
            x86_64-pc-windows-msvc; do
            echo "compiling $target"
            deno compile \
              --allow-read --allow-write --allow-env --allow-net \
              --target "$target" \
              --output "dist/jt-$target" \
              src/main.ts
          done
          ls -la dist/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
